<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CatGPT</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-toggle" id="sidebarToggle" title="收起侧边栏">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
          </svg>
        </button>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>新对话</span>
        </button>
        <a class="sidebar-link-btn" href="/api" title="打开 API 中心">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>
          </svg>
          <span>API 中心</span>
        </a>
      </div>

      <div class="chat-history" id="chatHistory"></div>

      <div class="sidebar-bottom">
        <div class="user-menu" id="userMenu">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-name" id="userName">用户</span>
          <button class="logout-btn" id="logoutBtn" title="退出登录">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- 主区域 -->
    <main class="main-content">
      <header class="main-header">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <div class="model-selector" id="modelSelector">
          <img src="/assets/logo.svg" alt="CatGPT Logo" class="brand-logo">
          <span>CatGPT</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
          <div class="model-dropdown hidden" id="modelDropdown">
            <div class="model-option active">
              <span class="model-name">GPT-4o</span>
              <span class="model-desc">最强大的模型</span>
            </div>
            <div class="model-option">
              <span class="model-name">GPT-4o mini</span>
              <span class="model-desc">快速且高效</span>
            </div>
            <div class="model-option">
              <span class="model-name">o1</span>
              <span class="model-desc">深度推理</span>
            </div>
          </div>
        </div>
        <div class="header-spacer"></div>
      </header>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-messages-inner" id="messagesInner">
          <div class="welcome-screen" id="welcomeScreen">
            <h2>今天有什么可以帮您的？</h2>
            <div class="suggestions">
              <button class="suggestion-btn" data-text="帮我写一封专业的商务邮件">
                <span class="suggestion-icon">✉️</span>
                <span>写一封商务邮件</span>
              </button>
              <button class="suggestion-btn" data-text="用简单的方式解释相对论">
                <span class="suggestion-icon">🔬</span>
                <span>解释相对论</span>
              </button>
              <button class="suggestion-btn" data-text="给我一份一周的健康饮食计划">
                <span class="suggestion-icon">🥗</span>
                <span>健康饮食计划</span>
              </button>
              <button class="suggestion-btn" data-text="帮我调试这段 Python 代码中的 bug">
                <span class="suggestion-icon">💻</span>
                <span>调试 Python 代码</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <div class="chat-input-box">
            <button class="attach-btn" title="附加文件">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
            <textarea id="messageInput" placeholder="询问任何问题" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </button>
          </div>
          <div class="chat-tools-row">
            <div class="chat-tools">
              <button class="tool-chip" id="deepThinkToggle" type="button">深度思考</button>
              <button class="tool-chip" id="webSearchToggle" type="button">联网搜索</button>
            </div>
            <div class="connect-status hidden" id="connectStatus">连接中...</div>
          </div>
          <p class="input-hint">CatGPT 可能会犯错。请核查重要信息。</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
